name: Publish News Mentions Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # The live feed.json is the durable archive and summary cache. Seed it
      # before generating so stories persist across runs and items are only
      # summarized once (keeps Gemini usage far under free-tier quotas).
      - name: Seed archive from live feed
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          curl -fsSL "$SITE_URL/feed.json" -o site/feed.json \
            && echo "Seeded archive from live feed" \
            || echo "Live feed unavailable; using committed feed.json"

      - name: Generate feed
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
