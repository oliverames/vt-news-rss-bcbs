name: Publish News Mentions Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize runs instead of cancelling: a cancelled run wastes its Gemini
# summary calls (they're only persisted on deploy), and two overlapping
# runs could each seed from the same stale live feed and drop the other's
# items. Queued runs are fine at this cadence.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Runs are serialized (cancel-in-progress: false), so without a timeout a
    # hung build would hold the queue for GitHub's 360-minute default and back
    # up hours of scheduled runs. A healthy run finishes well under 30 minutes.
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # This workflow never pushes back to the repo; don't leave the
          # workflow token in .git/config for later steps to read.
          persist-credentials: false
          fetch-depth: 2

      - name: Decide generation mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "full=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          sha="${{ github.sha }}"
          if ! changed="$(git diff --name-only "$before" "$sha" 2>/dev/null)"; then
            changed="$(git diff --name-only HEAD^ HEAD 2>/dev/null || true)"
          fi

          echo "Changed files:"
          printf '%s\n' "$changed"

          if [ -z "$changed" ]; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | grep -Eq '^(src/|test/|package(-lock)?\.json$|\.github/workflows/publish-feed\.yml$)'; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - name: Set up Node.js
        if: steps.mode.outputs.full == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.mode.outputs.full == 'true'
        run: npm ci

      - name: Run tests
        if: steps.mode.outputs.full == 'true'
        run: npm test

      # The live feed-audit.json is the durable archive and summary cache.
      # Seed it before generating so stories persist across runs and items are
      # only summarized once (keeps Gemini usage far under free-tier quotas).
      - name: Seed archive from live feed
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p site
          if curl -fsSL --max-time 60 "$SITE_URL/feed-audit.json" -o site/feed-audit.json; then
            echo "Seeded archive from live audit feed"
          elif curl -fsSL --max-time 60 "$SITE_URL/feed.json" -o site/feed-audit.json; then
            echo "Seeded archive from legacy live feed"
          else
            echo "Live archive unavailable; using committed feed-audit.json when present"
          fi

      - name: Generate feed
        if: steps.mode.outputs.full == 'true'
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate

      - name: Reuse live feed for static deploy
        if: steps.mode.outputs.full != 'true'
        run: echo "Static-only change; reusing the live feed seeded into site/."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
