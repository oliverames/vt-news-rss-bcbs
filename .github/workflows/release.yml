# Creates a GitHub release. Two entry points:
#   - push a v* tag: releases that tag
#   - workflow_dispatch with tag_name: creates the tag at the chosen ref and
#     releases it (useful where the environment can't push tags directly)
# Curated notes come from .github/RELEASE_NOTES.md when present at the
# released commit; otherwise GitHub auto-generates notes.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create and release (e.g. v1.1.0)"
        required: true
      dry_run:
        description: "Validate the release without creating a tag or release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; nothing to create."
            exit 0
          fi

          args=(--repo "$GITHUB_REPOSITORY" --title "$TAG_NAME")
          # Use the curated notes only when they were written for this exact
          # tag (first line names it) — otherwise a future release would
          # silently reuse an old tag's notes.
          if [ -f .github/RELEASE_NOTES.md ] \
            && head -1 .github/RELEASE_NOTES.md | grep -qF "$TAG_NAME"; then
            args+=(--notes-file .github/RELEASE_NOTES.md)
          else
            args+=(--generate-notes)
          fi
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            # Dispatched: the tag does not exist yet; create it here.
            args+=(--target "$GITHUB_SHA")
          fi

          if [ "$DRY_RUN" = "true" ]; then
            printf 'Dry run passed: would create release %s from %s.\n' "$TAG_NAME" "$GITHUB_SHA"
            printf 'Release arguments:'
            printf ' %q' "${args[@]}"
            printf '\n'
            exit 0
          fi

          gh release create "$TAG_NAME" "${args[@]}"
